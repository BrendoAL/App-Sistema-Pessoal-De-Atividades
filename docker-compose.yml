version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "8081:8081"

  activity-service:
    build: ./activity-service
    container_name: activity-service
    restart: always
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "8082:8082"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - user-service
      - activity-service
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mysql_data:
